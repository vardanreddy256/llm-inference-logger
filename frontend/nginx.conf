server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy backend API
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SSE support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # Proxy ingestion metrics
    location /metrics/ {
        proxy_pass http://ingestion-service:8001/metrics/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /ingest {
        proxy_pass http://ingestion-service:8001/ingest;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
